<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - أطياب</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--bg-main), #EAEAEA);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-soft);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            border-top: 5px solid var(--gold-main);
            text-align: center;
        }
        .login-card h2 {
            color: var(--primary-dark);
            margin-bottom: 2rem;
            font-size: 2.2rem;
            font-family: 'Amiri', serif;
        }
        .login-card .logo {
            font-size: 3rem;
            color: var(--primary-dark);
            text-decoration: none;
            display: block;
            margin-bottom: 1rem;
        }
        .login-card .logo span {
            color: var(--gold-main);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="index.html" class="logo">
            <img src="img/logo.png" alt="أطياب" style="width: 100px; height: 100px; object-fit: contain; display: block; margin: 0 auto 1.5rem;">
            <span>أطياب</span>
        </a>
        <h2>تسجيل الدخول</h2>
        
        <form id="login-form">
            <div class="form-group" style="text-align: right;">
                <label>اسم المستخدم</label>
                <input type="text" id="login-username" placeholder="مثال: admin" required autofocus>
            </div>
            
            <div class="form-group" style="text-align: right;">
                <label>كلمة المرور</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;" id="login-btn">دخول</button>
        </form>

        <p style="margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">ليس لديك حساب؟ <a href="register.html" style="color: var(--gold-dark); text-decoration: none; font-weight: bold;">أنشئ حساب بائع الآن</a></p>
        <p style="margin-top: 1rem; color: var(--text-muted); font-size: 0.9rem;">العودة إلى <a href="index.html" style="color: var(--gold-dark); text-decoration: none;">تصفح المتجر</a></p>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Redirect to dashboard if already logged in
        if (api.getCurrentUser()) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const un = document.getElementById('login-username').value;
            const pw = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            
            btn.disabled = true;
            btn.textContent = 'جاري التحقق...';

            try {
                await api.login(un, pw);
                window.location.href = 'dashboard.html';
            } catch (err) {
                let msg = err.message;
                if (msg.includes('مهلة') || msg.includes('timed out') || msg.includes('AbortError')) {
                    msg = 'تعذر الاتصال بالخادم. الخادم يستيقظ، يرجى المحاولة مرة أخرى خلال 10 ثوانٍ.';
                }
                alert(msg);
                btn.disabled = false;
                btn.textContent = 'دخول';
            }
        });
    </script>
</body>
</html>
