<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الأقسام - أطياب</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="أطياب" style="height: 40px; object-fit: contain;">
                أطياب<span>.</span>
            </a>
            <ul class="nav-links">
                <li><a href="dashboard.html">لوحة التحكم</a></li>
                <li><a href="visitors.html">الزوار</a></li>
                <li><a href="customers.html">العملاء</a></li>
                <li><a href="categories.html" class="active">الأقسام</a></li>
                <li><a href="add_product.html">إضافة منتج</a></li>
            </ul>
        </nav>
    </header>

    <main class="container" style="max-width: 700px;">
        <div class="admin-card">
            <h2>إدارة أقسام المنتجات</h2>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">أضف أو احذف الأقسام التي تظهر في متجرك.</p>
            
            <form id="add-category-form" style="margin-bottom: 2rem;">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <input type="text" id="cat-name" placeholder="اسم القسم الجديد (مثلاً: بخور، هدايا...)" required style="width:100%;">
                </div>
                <button type="submit" class="btn" style="width:100%; background: linear-gradient(135deg, var(--gold-main), var(--gold-dark)); color: var(--primary-dark); font-weight: 700;">إضافة قسم ✦</button>
            </form>

            <div id="cat-msg" style="text-align:center; margin-bottom:1rem; font-weight:bold;"></div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th style="width: 100px;">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="categories-list">
                        <!-- سيتم التحميل هنا -->
                        <tr><td colspan="2" style="text-align:center;">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const currentUser = api.getCurrentUser();
            if (!currentUser) {
                alert('عذراً، يجب عليك تسجيل الدخول للوصول إلى هذه الصفحة');
                window.location.href = 'login.html';
                return;
            }
            loadCategories();
        });

        async function loadCategories() {
            try {
                const categories = await api.getCategories();
                const list = document.getElementById('categories-list');
                list.innerHTML = '';
                
                if (categories.length === 0) {
                    list.innerHTML = '<tr><td colspan="2" style="text-align:center;">لا توجد أقسام مضافة حالياً.</td></tr>';
                    return;
                }

                categories.forEach(cat => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${cat.name}</td>
                        <td>
                            <button class="btn" style="background:var(--danger); font-size:0.8rem; padding:0.5rem 0.8rem;" onclick="deleteCategory('${cat.id}', '${cat.name}')">حذف</button>
                        </td>
                    `;
                    list.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('categories-list').innerHTML = '<tr><td colspan="2" style="color:var(--danger); text-align:center;">فشل تحميل الأقسام.</td></tr>';
            }
        }

        document.getElementById('add-category-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('cat-name');
            const msg = document.getElementById('cat-msg');
            const btn = e.target.querySelector('button');
            
            btn.disabled = true;
            try {
                await api.addCategory(input.value.trim());
                msg.style.color = 'green';
                msg.textContent = 'تم إضافة القسم بنجاح!';
                input.value = '';
                loadCategories();
            } catch (err) {
                msg.style.color = 'red';
                msg.textContent = err.message;
            } finally {
                btn.disabled = false;
                setTimeout(() => msg.textContent = '', 3000);
            }
        });

        async function deleteCategory(id, name) {
            if (confirm(`هل أنت متأكد من حذف قسم "${name}"؟`)) {
                try {
                    await api.deleteCategory(id);
                    loadCategories();
                } catch (err) {
                    alert('حدث خطأ أثناء الحذف: ' + err.message);
                }
            }
        }
    </script>

    <style>
        :root {
            --danger: #ff4757;
        }
        .admin-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .table-container {
            margin-top: 1rem;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }
        th, td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }
        th {
            font-weight: 700;
            color: var(--primary);
        }
        tr:hover {
            background: rgba(0,0,0,0.02);
        }
    </style>
</body>
</html>
